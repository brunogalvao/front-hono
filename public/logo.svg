<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="white" stop-opacity="1"/>
      <stop offset="1" stop-color="white" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>

  <!-- Inner subtle highlight -->
  <rect width="64" height="32" rx="16" fill="white" fill-opacity="0.05"/>

  <!-- Bar 1 — short -->
  <rect x="9" y="38" width="11" height="17" rx="3" fill="white" fill-opacity="0.45"/>

  <!-- Bar 2 — medium -->
  <rect x="26" y="27" width="11" height="28" rx="3" fill="white" fill-opacity="0.7"/>

  <!-- Bar 3 — tall (main, fully opaque) -->
  <rect x="43" y="14" width="11" height="41" rx="3" fill="url(#barGrad)"/>

  <!-- Trend line -->
  <polyline
    points="14.5,34 31.5,23 48.5,11"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.75"
    filter="url(#glow)"
  />

  <!-- Arrow head -->
  <polyline
    points="41,9 48.5,11 46.5,18.5"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.75"
  />
</svg>
